<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - Giỏ hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
        }
        
        nav a:hover {
            color: #4CAF50;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        h2 {
            margin-bottom: 2rem;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .quantity-controls button {
            padding: 0.25rem 0.75rem;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .quantity-controls button:hover {
            background: #45a049;
        }
        
        .remove-btn {
            padding: 0.5rem 1rem;
            background: #f44336;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .remove-btn:hover {
            background: #da190b;
        }
        
        .cart-summary {
            margin-top: 2rem;
            padding: 1rem;
            background: #f4f4f4;
            border-radius: 5px;
        }
        
        .cart-summary h3 {
            margin-bottom: 1rem;
        }
        
        .total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4CAF50;
            margin: 1rem 0;
        }
        
        .btn {
            padding: 0.8rem 2rem;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .empty-cart {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>E-Commerce</h1>
            <ul>
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
                <li><a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2>Giỏ hàng của bạn</h2>
        <div id="cart-items">
            <!-- Cart items will be loaded here -->
        </div>
        
        <div id="cart-summary" class="cart-summary" style="display: none;">
            <h3>Tổng đơn hàng</h3>
            <div class="total">Tổng cộng: <span id="cart-total">0đ</span></div>
            <button class="btn" onclick="checkout()">Đặt hàng</button>
        </div>
    </main>
    
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script>
        function displayCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            const cart = getCart();
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <h3>Giỏ hàng của bạn đang trống</h3>
                        <p>Hãy thêm sản phẩm vào giỏ hàng!</p>
                        <a href="products.html" class="btn">Mua sắm ngay</a>
                    </div>
                `;
                cartSummary.style.display = 'none';
                return;
            }
            
            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p>Giá: ${formatPrice(item.price)}</p>
                    </div>
                    <div class="cart-item-actions">
                        <div class="quantity-controls">
                            <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                        <div>
                            <strong>${formatPrice(item.price * item.quantity)}</strong>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})">Xóa</button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total').textContent = formatPrice(total);
            cartSummary.style.display = 'block';
        }
        
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }
        
        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                const cart = getCart();
                const item = cart.find(item => item.id === productId);
                if (item) {
                    item.quantity = newQuantity;
                    localStorage.setItem('cart', JSON.stringify(cart));
                    displayCart();
                    updateCartCount();
                }
            }
        }
        
        async function checkout() {
            const cart = getCart();
            
            if (cart.length === 0) {
                alert('Giỏ hàng của bạn đang trống!');
                return;
            }
            
            const order = {
                user_id: 1, // TODO: Get from logged in user
                total_amount: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                status: 'pending',
                items: cart.map(item => ({
                    product_id: item.id,
                    quantity: item.quantity,
                    price: item.price
                }))
            };
            
            try {
                await createOrder(order);
                alert('Đặt hàng thành công!');
                clearCart();
                displayCart();
                updateCartCount();
            } catch (error) {
                alert('Đặt hàng thất bại. Vui lòng thử lại!');
                console.error('Error creating order:', error);
            }
        }
        
        // Load cart on page load
        document.addEventListener('DOMContentLoaded', () => {
            displayCart();
            updateCartCount();
        });
    </script>
</body>
</html>
