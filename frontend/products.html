<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - Sản phẩm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
        }
        
        nav a:hover {
            color: #4CAF50;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        h2 {
            margin-bottom: 2rem;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 5px;
            text-align: center;
        }
        
        .product-card h3 {
            margin: 1rem 0;
        }
        
        .product-card p {
            color: #666;
            margin-bottom: 1rem;
        }
        
        .price {
            font-size: 1.5rem;
            color: #4CAF50;
            font-weight: bold;
            margin: 1rem 0;
        }
        
        .btn {
            padding: 0.5rem 1.5rem;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>E-Commerce</h1>
            <ul>
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
                <li><a href="cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2>Sản phẩm</h2>
        <div id="products-container" class="products-grid">
            <div class="loading">Đang tải sản phẩm...</div>
        </div>
    </main>
    
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script>
        async function loadProducts() {
            const container = document.getElementById('products-container');
            
            try {
                const products = await getProducts();
                
                if (products.length === 0) {
                    container.innerHTML = '<p>Không có sản phẩm nào.</p>';
                    return;
                }
                
                container.innerHTML = products.map(product => `
                    <div class="product-card">
                        <h3>${product.name}</h3>
                        <p>${product.description || 'Không có mô tả'}</p>
                        <div class="price">${formatPrice(product.price)}</div>
                        <p>Còn lại: ${product.stock}</p>
                        <button class="btn" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">
                            Thêm vào giỏ
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p>Không thể tải sản phẩm. Vui lòng thử lại sau.</p>';
                console.error('Error loading products:', error);
            }
        }
        
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }
        
        // Load products on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
